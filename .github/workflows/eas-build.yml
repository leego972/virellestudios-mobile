name: EAS Build (iOS + Android)

# Triggers:
#   - Push to main/master: runs TypeScript check + queues EAS builds
#   - Pull requests: TypeScript check only (no EAS build)
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: eas-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── TypeScript / lint check ──────────────────────────────────────────
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check

  # ── EAS Build — iOS + Android (main branch only) ─────────────────────
  eas-build:
    name: EAS Build (iOS + Android)
    runs-on: ubuntu-latest
    needs: [typecheck]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Set up EAS CLI with the Expo token
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # Write Apple API key to the expected location for EAS submit
      - name: Write Apple API key
        run: |
          mkdir -p "$RUNNER_TEMP/.appstoreconnect/private_keys"
          echo "$APPLE_API_PRIVATE_KEY" > "$RUNNER_TEMP/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8"
        env:
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}

      # Queue iOS build — auto-submits to App Store once the cloud build
      # completes. --no-wait exits immediately; EAS notifies by email.
      - name: Queue iOS build (auto-submit to App Store)
        run: |
          eas build \
            --platform ios \
            --non-interactive \
            --profile production \
            --no-wait \
            --auto-submit
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          EXPO_APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          EXPO_APPLE_API_KEY_PATH: ${{ format('{0}/.appstoreconnect/private_keys/AuthKey_{1}.p8', runner.temp, secrets.APPLE_API_KEY_ID) }}
          EXPO_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      # Queue Android build — produces a signed AAB for Play Store upload.
      # Play Store auto-submit requires a Google Service Account Key;
      # upload the AAB manually from the EAS dashboard until that is configured.
      - name: Queue Android build
        run: |
          eas build \
            --platform android \
            --non-interactive \
            --profile production \
            --no-wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
