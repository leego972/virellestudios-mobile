name: Mobile Dependency Refresh

on:
  push:
    branches:
      - hardening-mobile-deps-2026-07-22
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: hardening-mobile-deps-2026-07-22
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Regenerate lockfile
        run: pnpm install --no-frozen-lockfile
      - name: Commit regenerated lockfile
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          if git diff --cached --quiet; then
            echo "Lockfile already current"
          else
            git commit -m "Regenerate hardened mobile lockfile"
            git push origin HEAD:hardening-mobile-deps-2026-07-22
          fi
      - name: Upload regenerated lockfile
        uses: actions/upload-artifact@v4
        with:
          name: hardened-mobile-lockfile
          path: pnpm-lock.yaml
          if-no-files-found: error
          retention-days: 3
      - run: pnpm check
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
      - run: pnpm doctor
      - run: pnpm audit --audit-level moderate
