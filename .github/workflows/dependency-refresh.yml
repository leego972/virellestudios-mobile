name: Mobile Dependency Refresh

on:
  push:
    branches:
      - hardening-mobile-deps-2026-07-22
  workflow_dispatch:

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Regenerate lockfile
        run: pnpm install --no-frozen-lockfile
      - name: Upload regenerated lockfile
        uses: actions/upload-artifact@v4
        with:
          name: hardened-mobile-lockfile
          path: pnpm-lock.yaml
          if-no-files-found: error
          retention-days: 3
      - run: pnpm check
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
      - run: pnpm doctor
      - run: pnpm audit --audit-level moderate
