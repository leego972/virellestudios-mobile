name: Refresh icon branch lockfile

on:
  push:
    branches:
      - feature/virelle-cinema-icon-parity

permissions:
  contents: write

jobs:
  refresh:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/virelle-cinema-icon-parity
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --lockfile-only
      - name: Commit refreshed lockfile
        shell: bash
        run: |
          if git diff --quiet -- pnpm-lock.yaml; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          git commit -m "Refresh lockfile for patched dependencies"
          git push origin HEAD:feature/virelle-cinema-icon-parity
