name: Full Mobile Quality Gate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: TypeScript
        shell: bash
        run: |
          set +e
          pnpm check > typecheck.log 2>&1
          status=$?
          tail -n 160 typecheck.log
          exit $status
      - name: Upload TypeScript log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-mobile-typecheck
          path: typecheck.log
          if-no-files-found: error
          retention-days: 3
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
      - run: pnpm doctor
      - name: Dependency audit
        shell: bash
        run: |
          set +e
          pnpm audit --audit-level moderate > audit.log 2>&1
          status=$?
          tail -n 200 audit.log
          exit $status
      - name: Upload dependency audit log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-mobile-audit
          path: audit.log
          if-no-files-found: error
          retention-days: 3
